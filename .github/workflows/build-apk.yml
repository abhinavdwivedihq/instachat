name: Build Android APK
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Initialize and Build APK
        run: |
          # Automatically generates web-to-apk configuration securely
          bubblewrap init --manifest=manifest.json --meta=assetlinks.json || true
          bubblewrap build --interactive=false || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: instaChat-APK
          path: ./*.apk
          
