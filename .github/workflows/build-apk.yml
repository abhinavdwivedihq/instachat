name: Build Android APK
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Initialize and Build APK
        run: |
          # Automatically answer all setup questions for a fast standalone build
          yes "" | bubblewrap init --manifest=manifest.json || true
          yes "" | bubblewrap build || true

      - name: Check generated files
        run: ls -la

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: instaChat-APK
          path: |
            *.apk
            app-release-signed.apk
            
