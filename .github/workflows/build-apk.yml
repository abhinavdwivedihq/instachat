name: Build Android APK
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create App and Build APK
        run: |
          # Fresh project initialize
          cordova create myapp com.abhinav.instachat instaChat
          cd myapp
          cordova platform add android
          
          # Copy your main website files
          rm -rf www/*
          cp -r ../* www/ || true
          rm -rf www/myapp
          
          # Perfect Logo Scaling Strategy (Fixing the small icon issue)
          if [ -f "../IMG_20260707_141932.png" ]; then
            cp ../IMG_20260707_141932.png www/logo.png
            
            # 1. Inject Standard Icon Configuration
            sed -i '/<\/widget>/i \    <icon src="www/logo.png" \/>' config.xml
            
            # 2. Inject Adaptive Icon Configuration for Android (Forces full-bleed expansion)
            sed -i '/<\/platform>/i \        <icon background="www/logo.png" foreground="www/logo.png" \/>' config.xml
            
            # 3. Clean and overwrite Cordova defaults to prevent legacy shrinking templates
            find platforms/android/app/src/main/res/ -name "ic_launcher.png" -exec cp www/logo.png {} \;
            find platforms/android/app/src/main/res/ -name "ic_launcher_foreground.png" -exec cp www/logo.png {} \;
            find platforms/android/app/src/main/res/ -name "ic_launcher_round.png" -exec cp www/logo.png {} \;
          fi
          
          # Build the production-ready APK
          cordova build android --device

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: instaChat-APK
          path: myapp/platforms/android
          
