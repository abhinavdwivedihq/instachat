name: Build Android APK
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create App and Build APK
        run: |
          # Create a fresh cordova project
          cordova create myapp com.abhinav.instachat instaChat
          cd myapp
          cordova platform add android
          
          # Copy your website files into Cordova's asset folder
          rm -rf www/*
          cp -r ../* www/ || true
          rm -rf www/myapp
          
          # Fix the Logo / Icon implementation for Android
          if [ -f "../logo.png" ]; then
            cp ../logo.png www/logo.png
            # Injecting icon config directly into Cordova's config.xml
            sed -i '/<\/widget>/i \    <icon src="www/logo.png" \/>' config.xml
          elif [ -f "../logo.jpg" ]; then
            cp ../logo.jpg www/logo.png
            sed -i '/<\/widget>/i \    <icon src="www/logo.png" \/>' config.xml
          fi
          
          # Build the APK
          cordova build android --device

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: instaChat-APK
          path: myapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
          
