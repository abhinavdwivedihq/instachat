<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>InstaChat</title>
<link rel="icon" href="data:," />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: #F3F3F3; }
  .phone { width: 100%; height: 100vh; height: 100dvh; background: #1C1C1E; }
  .screen { width: 100%; height: 100%; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 32px; position: relative; }
  .logo-row { display: flex; align-items: center; gap: 8px; justify-content: center; margin-bottom: 10px; }
  .logo-row img { width: 44px; height: 44px; border-radius: 10px; }
  .logo-text { font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 26px; background: linear-gradient(135deg, #FF9FCE, #5EC2F0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .subtitle { font-size: 12.5px; color: #8E8E93; margin-bottom: 28px; text-align: center; }
  input, textarea { padding: 13px 16px; border-radius: 12px; border: 1.5px solid #EFEFEF; font-family: 'Inter', sans-serif; font-size: 14px; outline: none; background: #FAFAFA; width: 100%; }
  .error-msg { font-size: 11.5px; color: #FF6FB0; margin-bottom: 10px; text-align: center; }
  .btn-primary { width: 100%; padding: 13px 0; background: linear-gradient(135deg, #FF9FCE, #5EC2F0); color: #fff; border-radius: 999px; font-family: 'Inter', sans-serif; font-weight: 700; font-size: 14px; border: none; margin-top: 4px; }
  .btn-link { margin-top: 14px; background: none; border: none; font-size: 12.5px; color: #5EC2F0; font-weight: 600; }
  .username-title { font-weight: 700; font-size: 15px; color: #1C1C1E; margin-bottom: 4px; text-align: center; }
  .username-sub { font-size: 11.5px; color: #8E8E93; margin-bottom: 16px; text-align: center; }
  .handle-row { display: flex; align-items: center; width: 100%; margin-bottom: 10px; border-radius: 12px; border: 1.5px solid #EFEFEF; background: #FAFAFA; padding: 13px 16px; }
  .handle-row span { font-size: 14px; color: #8E8E93; margin-right: 2px; }
  .handle-row input { background: transparent; border: none; padding: 0; }
  .hidden { display: none !important; }
  #error-box { display: none; position: fixed; top: 0; left: 0; right: 0; background: #ffe1e1; color: #a30000; padding: 16px; font-family: monospace; font-size: 13px; z-index: 99999; white-space: pre-wrap; word-break: break-word; }
  .field { margin-bottom: 10px; width: 100%; }

  /* ---- App shell (feed) ---- */
  #app-screen { padding: 0; justify-content: flex-start; align-items: stretch; }
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 10px; border-bottom: 1px solid #EFEFEF; }
  .topbar .logo-text { font-size: 20px; }
  .feed { flex: 1; overflow-y: auto; padding-bottom: 70px; }
  .empty-feed { text-align: center; color: #8E8E93; font-size: 13px; padding: 60px 20px; }
  .post-card { border-bottom: 1px solid #EFEFEF; padding-bottom: 12px; }
  .post-header { display: flex; align-items: center; gap: 10px; padding: 12px 14px 8px; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 13px; flex-shrink: 0; }
  .post-user { font-weight: 700; font-size: 13.5px; color: #1C1C1E; }
  .post-time { font-size: 10.5px; color: #8E8E93; }
  .post-image { width: 100%; max-height: 420px; object-fit: cover; display: block; background: #f0f0f0; }
  .post-actions { display: flex; align-items: center; gap: 14px; padding: 10px 14px 0; }
  .like-btn { background: none; border: none; font-size: 22px; line-height: 1; cursor: pointer; }
  .post-likes { padding: 6px 14px 0; font-weight: 700; font-size: 12.5px; color: #1C1C1E; }
  .post-caption { padding: 4px 14px 0; font-size: 13px; color: #1C1C1E; }
  .post-caption b { font-weight: 700; }

  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; display: flex; align-items: center; justify-content: space-around; background: #fff; border-top: 1px solid #EFEFEF; padding: 10px 0 16px; }
  .nav-btn { background: none; border: none; padding: 6px; display: flex; align-items: center; justify-content: center; }
  .nav-btn svg { width: 24px; height: 24px; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: flex-end; z-index: 500; }
  .create-box { width: 100%; background: #fff; border-radius: 20px 20px 0 0; padding: 18px; max-height: 85vh; overflow-y: auto; }
  .create-box h3 { font-family: 'Poppins', sans-serif; font-size: 16px; margin-bottom: 14px; text-align: center; }
  .photo-picker { width: 100%; aspect-ratio: 1/1; border-radius: 14px; border: 2px dashed #EFEFEF; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px; color: #8E8E93; font-size: 12.5px; margin-bottom: 12px; overflow: hidden; position: relative; background: #FAFAFA; }
  .photo-picker img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
  .create-actions { display: flex; gap: 10px; margin-top: 14px; }
  .create-actions button { flex: 1; }
  .btn-secondary { background: #FAFAFA; border: 1px solid #EFEFEF; color: #8E8E93; border-radius: 999px; padding: 13px 0; font-weight: 700; font-size: 13px; }

  /* ---- Profile ---- */
  .profile-header { display: flex; flex-direction: column; align-items: center; padding: 28px 20px 16px; }
  .profile-avatar { width: 84px; height: 84px; border-radius: 50%; padding: 3px; background: linear-gradient(135deg, #FF9FCE, #5EC2F0); }
  .profile-avatar-inner { width: 100%; height: 100%; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 30px; border: 3px solid #fff; }
  .profile-handle { font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 17px; color: #1C1C1E; margin-top: 12px; }
  .profile-stats { display: flex; gap: 32px; margin-top: 14px; }
  .profile-stat { display: flex; flex-direction: column; align-items: center; }
  .profile-stat b { font-size: 16px; color: #1C1C1E; }
  .profile-stat span { font-size: 11px; color: #8E8E93; }
  .profile-logout { margin-top: 16px; padding: 8px 22px; border: 1px solid #EFEFEF; border-radius: 999px; background: none; font-size: 12px; color: #8E8E93; font-weight: 600; }
  .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; border-top: 1px solid #EFEFEF; }
  .profile-grid img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; }
  .profile-grid .no-img { width: 100%; aspect-ratio: 1/1; background: #FAFAFA; }

  /* ---- Chat List ---- */
  .chatlist-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 10px; }
  .chatlist-header h3 { font-family: 'Poppins', sans-serif; font-size: 17px; color: #1C1C1E; }
  .newchat-btn { background: linear-gradient(135deg, #FF9FCE, #5EC2F0); border: none; color: #fff; border-radius: 999px; padding: 7px 14px; font-size: 12px; font-weight: 700; }
  .chat-row { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-bottom: 1px solid #EFEFEF; cursor: pointer; background: none; width: 100%; text-align: left; }
  .chat-row-name { font-weight: 700; font-size: 14px; color: #1C1C1E; }
  .chat-row-preview { font-size: 12px; color: #8E8E93; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }
  .chat-row-time { font-size: 10px; color: #8E8E93; margin-left: auto; align-self: flex-start; }

  /* ---- Chat Room ---- */
  .chatroom-topbar { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-bottom: 1px solid #EFEFEF; }
  .chatroom-back { background: none; border: none; }
  .chatroom-messages { flex: 1; overflow-y: auto; padding: 12px 14px 80px; display: flex; flex-direction: column; gap: 8px; }
  .msg-bubble { max-width: 75%; padding: 9px 13px; border-radius: 16px; font-size: 13.5px; line-height: 1.35; word-wrap: break-word; }
  .msg-mine { align-self: flex-end; background: linear-gradient(135deg, #FF9FCE, #5EC2F0); color: #fff; border-bottom-right-radius: 4px; }
  .msg-theirs { align-self: flex-start; background: #FAFAFA; color: #1C1C1E; border-bottom-left-radius: 4px; }
  .chatroom-inputbar { position: fixed; bottom: 0; left: 0; right: 0; display: flex; gap: 8px; padding: 10px 12px 16px; background: #fff; border-top: 1px solid #EFEFEF; }
  .chatroom-inputbar input { flex: 1; }
  .send-btn { background: linear-gradient(135deg, #FF9FCE, #5EC2F0); border: none; border-radius: 50%; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
</style>
</head>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>

<script>
window.addEventListener('error', function (e) {
  var box = document.getElementById('error-box');
  box.style.display = 'block';
  box.textContent = 'ERROR: ' + (e.message || 'Unknown error') + ' (line ' + e.lineno + ')';
});

var firebaseConfig = {
  apiKey: "AIzaSyADaGrquI9IVS79lmtKwRA53p0uBqtCYI0",
  authDomain: "instachat-official.firebaseapp.com",
  projectId: "instachat-official",
  storageBucket: "instachat-official.firebasestorage.app",
  messagingSenderId: "268835402085",
  appId: "1:268835402085:web:5bdd493c99c94dddccf18c"
};
firebase.initializeApp(firebaseConfig);
var auth = firebase.auth();
var db = firebase.firestore();

var currentHandle = null;
var pendingPhotoDataUrl = null;

function show(id) {
  ['loading-screen','auth-screen','username-screen','app-screen'].forEach(function (s) {
    document.getElementById(s).classList.toggle('hidden', s !== id);
  });
}

function avatarColor(name) {
  var colors = ['#FF9FCE','#5EC2F0','#FF6FB0','#2FA8E0','#C9A6FF'];
  var h = 0;
  for (var i = 0; i < name.length; i++) h = name.charCodeAt(i) + ((h << 5) - h);
  return colors[Math.abs(h) % colors.length];
}

function timeAgo(ts) {
  if (!ts) return '';
  var diff = Date.now() - ts;
  var m = Math.floor(diff / 60000);
  if (m < 1) return 'abhi';
  if (m < 60) return m + 'm';
  var h = Math.floor(m / 60);
  return h < 24 ? h + 'h' : Math.floor(h / 24) + 'd';
}

/* ---------------- AUTH ---------------- */
var mode = 'login';

document.getElementById('toggle-mode-btn').addEventListener('click', function () {
  mode = mode === 'login' ? 'signup' : 'login';
  document.getElementById('auth-submit-btn').textContent = mode === 'login' ? 'Login Karein' : 'Signup Karein';
  this.textContent = mode === 'login' ? 'Naya account? Signup karein' : 'Pehle se account hai? Login karein';
});

document.getElementById('auth-submit-btn').addEventListener('click', function () {
  var errEl = document.getElementById('auth-error');
  errEl.classList.add('hidden');
  var email = document.getElementById('email-input').value.trim();
  var password = document.getElementById('password-input').value;
  if (!email || password.length < 6) {
    errEl.textContent = "Sahi email aur kam se kam 6-character password daalein";
    errEl.classList.remove('hidden');
    return;
  }
  var btn = this;
  btn.disabled = true;
  btn.textContent = "Ruko…";

  function resetBtn() {
    btn.disabled = false;
    btn.textContent = mode === 'login' ? 'Login Karein' : 'Signup Karein';
  }

  var action = mode === 'login'
    ? auth.signInWithEmailAndPassword(email, password)
    : auth.createUserWithEmailAndPassword(email, password);

  action.then(function (result) {
    resetBtn();
    var uid = result.user.uid;
    return db.collection('users').doc(uid).get().then(function (doc) {
      if (doc.exists && doc.data().handle) {
        enterApp(doc.data().handle);
      } else {
        show('username-screen');
      }
    });
  }).catch(function (e) {
    resetBtn();
    errEl.textContent = friendlyAuthError(e);
    errEl.classList.remove('hidden');
  });
});

function friendlyAuthError(e) {
  var code = e && e.code ? e.code : '';
  if (code === 'auth/invalid-credential' || code === 'auth/user-not-found' || code === 'auth/wrong-password') {
    return "Account nahi mila ya password galat hai. Neeche 'Signup karein' dabakar naya account banayein.";
  }
  if (code === 'auth/email-already-in-use') return "Yeh email pehle se registered hai. Upar 'Login Karein' try karein.";
  if (code === 'auth/weak-password') return "Password kam se kam 6 characters ka hona chahiye.";
  if (code === 'auth/invalid-email') return "Sahi email address daalein.";
  if (code === 'auth/too-many-requests') return "Bahut zyada attempts ho gaye. Thodi der baad try karein.";
  return e && e.message ? e.message : "Kuch galat hua, dobara try karein.";
}

document.getElementById('finish-signup-btn').addEventListener('click', function () {
  var errEl = document.getElementById('handle-error');
  errEl.classList.add('hidden');
  var raw = document.getElementById('handle-input').value.trim().toLowerCase();
  var clean = raw.replace(/[^a-z0-9_.]/g, '');
  if (clean.length < 3) {
    errEl.textContent = "Kam se kam 3 letters ka username daalein";
    errEl.classList.remove('hidden');
    return;
  }
  var btn = this;
  btn.disabled = true;
  btn.textContent = "Ruko…";
  var uid = auth.currentUser.uid;
  db.collection('usernames').doc(clean).get().then(function (takenDoc) {
    if (takenDoc.exists) {
      btn.disabled = false;
      btn.textContent = "Shuru Karein";
      errEl.textContent = "Yeh username pehle se liya ja chuka hai";
      errEl.classList.remove('hidden');
      return;
    }
    return db.collection('usernames').doc(clean).set({ uid: uid }).then(function () {
      return db.collection('users').doc(uid).set({
        handle: clean,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    }).then(function () {
      btn.disabled = false;
      btn.textContent = "Shuru Karein";
      enterApp(clean);
    });
  }).catch(function (e) {
    btn.disabled = false;
    btn.textContent = "Shuru Karein";
    errEl.textContent = "Kuch galat hua: " + e.message;
    errEl.classList.remove('hidden');
  });
});

document.getElementById('logout-btn-top').addEventListener('click', function () {
  auth.signOut();
  show('auth-screen');
});

function enterApp(handle) {
  currentHandle = handle;
  show('app-screen');
  loadFeed();
}

auth.onAuthStateChanged(function (user) {
  if (user) {
    db.collection('users').doc(user.uid).get().then(function (doc) {
      if (doc.exists && doc.data().handle) {
        enterApp(doc.data().handle);
      } else {
        show('username-screen');
      }
    });
  } else {
    show('auth-screen');
  }
});

/* ---------------- FEED ---------------- */
function loadFeed() {
  var container = document.getElementById('feed-container');
  container.innerHTML = '<p class="empty-feed">Load ho raha hai…</p>';
  db.collection('posts').orderBy('createdAtMs', 'desc').limit(30).get().then(function (snap) {
    if (snap.empty) {
      container.innerHTML = '<p class="empty-feed">Abhi koi post nahi hai. Sabse pehla post tum banao! 📸</p>';
      return;
    }
    container.innerHTML = '';
    snap.forEach(function (doc) {
      container.appendChild(renderPostCard(doc.id, doc.data()));
    });
  }).catch(function (e) {
    container.innerHTML = '<p class="empty-feed">Feed load nahi ho paya: ' + e.message + '</p>';
  });
}

function renderPostCard(postId, post) {
  var card = document.createElement('div');
  card.className = 'post-card';

  var header = document.createElement('div');
  header.className = 'post-header';
  var av = document.createElement('div');
  av.className = 'avatar';
  av.style.background = avatarColor(post.handle || '?');
  av.textContent = (post.handle || '?')[0].toUpperCase();
  var nameWrap = document.createElement('div');
  nameWrap.innerHTML = '<div class="post-user">' + escapeHtml(post.handle || 'unknown') + '</div><div class="post-time">' + timeAgo(post.createdAtMs) + '</div>';
  header.appendChild(av);
  header.appendChild(nameWrap);
  card.appendChild(header);

  if (post.imageData) {
    var img = document.createElement('img');
    img.className = 'post-image';
    img.src = post.imageData;
    card.appendChild(img);
  }

  var actions = document.createElement('div');
  actions.className = 'post-actions';
  var likeBtn = document.createElement('button');
  likeBtn.className = 'like-btn';
  likeBtn.textContent = '🤍';
  likeBtn.dataset.liked = 'false';
  actions.appendChild(likeBtn);
  card.appendChild(actions);

  var likesLine = document.createElement('div');
  likesLine.className = 'post-likes';
  likesLine.textContent = (post.likesCount || 0) + ' likes';
  card.appendChild(likesLine);

  if (post.caption) {
    var cap = document.createElement('div');
    cap.className = 'post-caption';
    cap.innerHTML = '<b>' + escapeHtml(post.handle || '') + '</b> ' + escapeHtml(post.caption);
    card.appendChild(cap);
  }

  // check my like state
  var myUid = auth.currentUser.uid;
  db.collection('posts').doc(postId).collection('likes').doc(myUid).get().then(function (likeDoc) {
    if (likeDoc.exists) {
      likeBtn.textContent = '❤️';
      likeBtn.dataset.liked = 'true';
    }
  });

  likeBtn.addEventListener('click', function () {
    var liked = likeBtn.dataset.liked === 'true';
    var likeRef = db.collection('posts').doc(postId).collection('likes').doc(myUid);
    var postRef = db.collection('posts').doc(postId);
    if (liked) {
      likeRef.delete().then(function () {
        postRef.update({ likesCount: firebase.firestore.FieldValue.increment(-1) });
      });
      likeBtn.textContent = '🤍';
      likeBtn.dataset.liked = 'false';
      likesLine.textContent = Math.max(0, (parseInt(likesLine.textContent) || 1) - 1) + ' likes';
    } else {
      likeRef.set({ likedAt: firebase.firestore.FieldValue.serverTimestamp() }).then(function () {
        postRef.update({ likesCount: firebase.firestore.FieldValue.increment(1) });
      });
      likeBtn.textContent = '❤️';
      likeBtn.dataset.liked = 'true';
      likesLine.textContent = ((parseInt(likesLine.textContent) || 0) + 1) + ' likes';
    }
  });

  return card;
}

function escapeHtml(str) {
  var d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function showSection(id) {
  ['feed-container', 'profile-container', 'chatlist-container', 'chatroom-container'].forEach(function (s) {
    document.getElementById(s).classList.toggle('hidden', s !== id);
  });
  detachChatRoomListener();
}

document.getElementById('nav-home').addEventListener('click', function () {
  document.getElementById('create-modal').classList.add('hidden');
  showSection('feed-container');
  loadFeed();
});

/* ---------------- CREATE POST ---------------- */
document.getElementById('nav-create').addEventListener('click', function () {
  pendingPhotoDataUrl = null;
  document.getElementById('photo-picker-text').textContent = '📷 Photo lein ya gallery se chunein';
  document.getElementById('photo-input').value = '';
  document.getElementById('caption-input').value = '';
  document.getElementById('create-error').classList.add('hidden');
  var preview = document.getElementById('photo-picker-label').querySelector('img');
  if (preview) preview.remove();
  document.getElementById('create-modal').classList.remove('hidden');
});

document.getElementById('cancel-create-btn').addEventListener('click', function () {
  document.getElementById('create-modal').classList.add('hidden');
});

document.getElementById('photo-picker-label').addEventListener('click', function () {
  document.getElementById('photo-input').click();
});

document.getElementById('photo-input').addEventListener('change', function (e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function (ev) {
    var img = new Image();
    img.onload = function () {
      var canvas = document.createElement('canvas');
      var maxW = 640;
      var scale = Math.min(1, maxW / img.width);
      canvas.width = img.width * scale;
      canvas.height = img.height * scale;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      pendingPhotoDataUrl = canvas.toDataURL('image/jpeg', 0.65);
      var label = document.getElementById('photo-picker-label');
      var oldImg = label.querySelector('img');
      if (oldImg) oldImg.remove();
      var previewImg = document.createElement('img');
      previewImg.src = pendingPhotoDataUrl;
      label.appendChild(previewImg);
      document.getElementById('photo-picker-text').style.zIndex = '1';
      document.getElementById('photo-picker-text').style.position = 'relative';
      document.getElementById('photo-picker-text').textContent = '';
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

document.getElementById('submit-post-btn').addEventListener('click', function () {
  var errEl = document.getElementById('create-error');
  errEl.classList.add('hidden');
  if (!pendingPhotoDataUrl) {
    errEl.textContent = "Pehle ek photo chunein";
    errEl.classList.remove('hidden');
    return;
  }
  var caption = document.getElementById('caption-input').value.trim();
  var btn = this;
  btn.disabled = true;
  btn.textContent = "Post ho raha hai…";
  db.collection('posts').add({
    uid: auth.currentUser.uid,
    handle: currentHandle,
    imageData: pendingPhotoDataUrl,
    caption: caption,
    likesCount: 0,
    createdAtMs: Date.now(),
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  }).then(function () {
    btn.disabled = false;
    btn.textContent = "Post Karein";
    document.getElementById('create-modal').classList.add('hidden');
    showSection('feed-container');
    loadFeed();
  }).catch(function (e) {
    btn.disabled = false;
    btn.textContent = "Post Karein";
    errEl.textContent = "Post nahi ho paya: " + e.message;
    errEl.classList.remove('hidden');
  });
});

document.getElementById('nav-profile').addEventListener('click', function () {
  document.getElementById('create-modal').classList.add('hidden');
  showSection('profile-container');
  loadProfile();
});

/* ---------------- CHAT ---------------- */
var currentChatId = null;
var currentChatUnsub = null;
var currentChatOtherHandle = null;

function detachChatRoomListener() {
  if (currentChatUnsub) {
    currentChatUnsub();
    currentChatUnsub = null;
  }
}

document.getElementById('nav-chat').addEventListener('click', function () {
  document.getElementById('create-modal').classList.add('hidden');
  showSection('chatlist-container');
  loadChatList();
});

function chatIdFor(uidA, uidB) {
  return [uidA, uidB].sort().join('_');
}

function loadChatList() {
  var container = document.getElementById('chatlist-container');
  container.innerHTML = '<p class="empty-feed">Load ho raha hai…</p>';
  var myUid = auth.currentUser.uid;
  db.collection('chats').where('members', 'array-contains', myUid).get().then(function (snap) {
    var header = document.createElement('div');
    header.className = 'chatlist-header';
    header.innerHTML = '<h3>Baatein</h3>';
    var newBtn = document.createElement('button');
    newBtn.className = 'newchat-btn';
    newBtn.textContent = '+ Naya Chat';
    newBtn.addEventListener('click', openNewChatModal);
    header.appendChild(newBtn);

    container.innerHTML = '';
    container.appendChild(header);

    if (snap.empty) {
      var empty = document.createElement('p');
      empty.className = 'empty-feed';
      empty.textContent = 'Koi chat nahi hai abhi. "+ Naya Chat" se shuru karo!';
      container.appendChild(empty);
      return;
    }

    var docs = [];
    snap.forEach(function (doc) { docs.push(doc); });
    docs.sort(function (a, b) { return (b.data().lastMessageAtMs || 0) - (a.data().lastMessageAtMs || 0); });

    docs.forEach(function (doc) {
      var chat = doc.data();
      var otherUid = chat.members.filter(function (m) { return m !== myUid; })[0];
      var otherHandle = (chat.handles && chat.handles[otherUid]) || 'user';

      var row = document.createElement('button');
      row.className = 'chat-row';
      var av = document.createElement('div');
      av.className = 'avatar';
      av.style.background = avatarColor(otherHandle);
      av.textContent = otherHandle[0].toUpperCase();
      var textWrap = document.createElement('div');
      textWrap.innerHTML = '<div class="chat-row-name">' + escapeHtml(otherHandle) + '</div><div class="chat-row-preview">' + escapeHtml(chat.lastMessage || 'Chat shuru karo') + '</div>';
      var timeEl = document.createElement('div');
      timeEl.className = 'chat-row-time';
      timeEl.textContent = timeAgo(chat.lastMessageAtMs);

      row.appendChild(av);
      row.appendChild(textWrap);
      row.appendChild(timeEl);
      row.addEventListener('click', function () {
        openChatRoom(doc.id, otherHandle);
      });
      container.appendChild(row);
    });
  }).catch(function (e) {
    container.innerHTML = '<p class="empty-feed">Chat list load nahi hua: ' + e.message + '</p>';
  });
}

function openNewChatModal() {
  document.getElementById('newchat-username-input').value = '';
  document.getElementById('newchat-error').classList.add('hidden');
  document.getElementById('newchat-modal').classList.remove('hidden');
}

document.getElementById('cancel-newchat-btn').addEventListener('click', function () {
  document.getElementById('newchat-modal').classList.add('hidden');
});

document.getElementById('start-chat-btn').addEventListener('click', function () {
  var errEl = document.getElementById('newchat-error');
  errEl.classList.add('hidden');
  var handle = document.getElementById('newchat-username-input').value.trim().toLowerCase().replace(/[^a-z0-9_.]/g, '');
  if (!handle) {
    errEl.textContent = "Username daalein";
    errEl.classList.remove('hidden');
    return;
  }
  if (handle === currentHandle) {
    errEl.textContent = "Yeh to aap khud hain!";
    errEl.classList.remove('hidden');
    return;
  }
  var btn = this;
  btn.disabled = true;
  btn.textContent = "Dhoond rahe hain…";
  db.collection('usernames').doc(handle).get().then(function (unameDoc) {
    if (!unameDoc.exists) {
      btn.disabled = false;
      btn.textContent = "Chat Shuru Karein";
      errEl.textContent = "Yeh username exist nahi karta";
      errEl.classList.remove('hidden');
      return;
    }
    var otherUid = unameDoc.data().uid;
    var myUid = auth.currentUser.uid;
    var chatId = chatIdFor(myUid, otherUid);
    var chatRef = db.collection('chats').doc(chatId);
    return chatRef.get().then(function (chatDoc) {
      var finish = function () {
        btn.disabled = false;
        btn.textContent = "Chat Shuru Karein";
        document.getElementById('newchat-modal').classList.add('hidden');
        openChatRoom(chatId, handle);
      };
      if (chatDoc.exists) {
        finish();
      } else {
        var handles = {};
        handles[myUid] = currentHandle;
        handles[otherUid] = handle;
        return chatRef.set({
          members: [myUid, otherUid],
          handles: handles,
          lastMessage: '',
          lastMessageAtMs: Date.now()
        }).then(finish);
      }
    });
  }).catch(function (e) {
    btn.disabled = false;
    btn.textContent = "Chat Shuru Karein";
    errEl.textContent = "Kuch galat hua: " + e.message;
    errEl.classList.remove('hidden');
  });
});

function openChatRoom(chatId, otherHandle) {
  currentChatId = chatId;
  currentChatOtherHandle = otherHandle;
  showSection('chatroom-container');

  var container = document.getElementById('chatroom-container');
  container.innerHTML =
    '<div class="chatroom-topbar">' +
      '<button class="chatroom-back" id="chatroom-back-btn"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#1C1C1E" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>' +
      '<div class="avatar" style="background:' + avatarColor(otherHandle) + '">' + otherHandle[0].toUpperCase() + '</div>' +
      '<div class="chat-row-name">' + escapeHtml(otherHandle) + '</div>' +
    '</div>' +
    '<div class="chatroom-messages" id="chatroom-messages"></div>' +
    '<div class="chatroom-inputbar">' +
      '<input id="chat-message-input" placeholder="Message likhein…" />' +
      '<button class="send-btn" id="chat-send-btn"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="#fff" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>' +
    '</div>';

  document.getElementById('chatroom-back-btn').addEventListener('click', function () {
    showSection('chatlist-container');
    loadChatList();
  });

  var msgsEl = document.getElementById('chatroom-messages');
  var myUid = auth.currentUser.uid;

  currentChatUnsub = db.collection('chats').doc(chatId).collection('messages')
    .orderBy('createdAtMs', 'asc')
    .onSnapshot(function (snap) {
      msgsEl.innerHTML = '';
      snap.forEach(function (doc) {
        var msg = doc.data();
        var bubble = document.createElement('div');
        bubble.className = 'msg-bubble ' + (msg.from === myUid ? 'msg-mine' : 'msg-theirs');
        bubble.textContent = msg.text;
        msgsEl.appendChild(bubble);
      });
      msgsEl.scrollTop = msgsEl.scrollHeight;
    }, function (e) {
      msgsEl.innerHTML = '<p class="empty-feed">Messages load nahi hue: ' + e.message + '</p>';
    });

  function sendMessage() {
    var input = document.getElementById('chat-message-input');
    var text = input.value.trim();
    if (!text) return;
    input.value = '';
    var msg = {
      from: myUid,
      text: text,
      createdAtMs: Date.now(),
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    };
    db.collection('chats').doc(chatId).collection('messages').add(msg).then(function () {
      db.collection('chats').doc(chatId).update({
        lastMessage: text,
        lastMessageAtMs: Date.now()
      });
    });
  }

  document.getElementById('chat-send-btn').addEventListener('click', sendMessage);
  document.getElementById('chat-message-input').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') sendMessage();
  });
}

function loadProfile() {
  var container = document.getElementById('profile-container');
  container.innerHTML = '<p class="empty-feed">Load ho raha hai…</p>';
  var myUid = auth.currentUser.uid;
  db.collection('posts').where('uid', '==', myUid).get().then(function (snap) {
    var docs = [];
    snap.forEach(function (doc) { docs.push(doc); });
    docs.sort(function (a, b) { return (b.data().createdAtMs || 0) - (a.data().createdAtMs || 0); });
    var header = document.createElement('div');
    header.className = 'profile-header';
    header.innerHTML =
      '<div class="profile-avatar"><div class="profile-avatar-inner" style="background:' + avatarColor(currentHandle) + '">' + currentHandle[0].toUpperCase() + '</div></div>' +
      '<div class="profile-handle">@' + escapeHtml(currentHandle) + '</div>' +
      '<div class="profile-stats"><div class="profile-stat"><b>' + docs.length + '</b><span>Posts</span></div></div>' +
      '<button class="profile-logout" id="profile-logout-btn">Logout</button>';

    var grid = document.createElement('div');
    grid.className = 'profile-grid';
    if (docs.length === 0) {
      var empty = document.createElement('p');
      empty.className = 'empty-feed';
      empty.textContent = 'Abhi koi post nahi hai. "+" dabakar pehla post banao!';
      grid.appendChild(empty);
    } else {
      docs.forEach(function (doc) {
        var post = doc.data();
        if (post.imageData) {
          var img = document.createElement('img');
          img.src = post.imageData;
          grid.appendChild(img);
        } else {
          var ph = document.createElement('div');
          ph.className = 'no-img';
          grid.appendChild(ph);
        }
      });
    }

    container.innerHTML = '';
    container.appendChild(header);
    container.appendChild(grid);

    document.getElementById('profile-logout-btn').addEventListener('click', function () {
      auth.signOut();
      show('auth-screen');
    });
  }).catch(function (e) {
    container.innerHTML = '<p class="empty-feed">Profile load nahi hua: ' + e.message + '</p>';
  });
}
</script>
