<script>
  function showError(msg) {
    var box = document.getElementById('error-box');
    box.style.display = 'block';
    box.textContent = 'ERROR: ' + msg;
  }
  window.addEventListener('error', function(e) {
    showError((e.message || 'Unknown error') + ' (line ' + e.lineno + ')');
  });
  window.addEventListener('unhandledrejection', function(e) {
    showError('Promise error: ' + (e.reason && e.reason.message ? e.reason.message : e.reason));
  });
</script>

function Logo({ size = 40 }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8, justifyContent: "center" }}>
      <img src={LOGO_URI} alt="InstaChat" style={{ width: size * 1.3, height: size * 1.3, borderRadius: size * 0.28 }} />
      <span style={{ fontFamily: F_DISPLAY, fontWeight: 700, fontSize: size, background: GRAD, WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>
        InstaChat
      </span>
    </div>
  );
}

/* ---------- AUTH SCREEN (real Firebase Phone OTP) ---------- */
function AuthScreen({ onReady }) {
  const [phone, setPhone] = useState("");
  const [otp, setOtp] = useState("");
  const [handle, setHandle] = useState("");
  const [step, setStep] = useState("phone");
  const [error, setError] = useState("");
  const [busy, setBusy] = useState(false);
  const confirmationRef = useRef(null);
  const verifierRef = useRef(null);

  const sendOtp = () => {
    setError("");
    const clean = phone.replace(/\D/g, "");
    if (clean.length < 10) { setError("Sahi 10-digit number daalein"); return; }
    setBusy(true);
    if (!verifierRef.current) {
      verifierRef.current = new firebase.auth.RecaptchaVerifier("recaptcha-container", { size: "invisible" }, auth);
    }
    auth.signInWithPhoneNumber("+91" + clean, verifierRef.current)
      .then((confirmation) => {
        confirmationRef.current = confirmation;
        setStep("otp");
        setBusy(false);
      })
      .catch((e) => {
        setBusy(false);
        setError("OTP nahi bhej paya: " + e.message);
      });
  };

  const verifyOtp = () => {
    setError("");
    if (!confirmationRef.current) return;
    setBusy(true);
    confirmationRef.current.confirm(otp.trim())
      .then(async (result) => {
        const uid = result.user.uid;
        const doc = await db.collection("users").doc(uid).get();
        setBusy(false);
        if (doc.exists && doc.data().handle) {
          onReady(uid, doc.data().handle);
        } else {
          setStep("username");
        }
      })
      .catch((e) => {
        setBusy(false);
        setError("OTP galat hai: " + e.message);
      });
  };

  const finishSignup = async () => {
    setError("");
    const clean = handle.trim().toLowerCase().replace(/[^a-z0-9_.]/g, "");
    if (clean.length < 3) { setError("Kam se kam 3 letters ka username daalein"); return; }
    setBusy(true);
    const uid = auth.currentUser.uid;
    try {
      const takenDoc = await db.collection("usernames").doc(clean).get();
      if (takenDoc.exists) {
        setBusy(false);
        setError("Yeh username pehle se liya ja chuka hai");
        return;
      }
      await db.collection("usernames").doc(clean).set({ uid });
      await db.collection("users").doc(uid).set({
        handle: clean,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      });
      setBusy(false);
      onReady(uid, clean);
    } catch (e) {
      setBusy(false);
      setError("Kuch galat hua: " + e.message);
    }
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%", alignItems: "center", justifyContent: "center", padding: "0 32px", background: C.bg }}>
      <Logo size={34} />
      <span style={{ fontFamily: F_BODY, fontSize: 12.5, color: C.sub, marginTop: 10, marginBottom: 28, textAlign: "center" }}>
        Photos, stories aur baatein — sab ek jagah
      </span>

      {step === "phone" && (
        <div style={{ width: "100%" }}>
          <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "center", padding: "0 12px", borderRadius: 12, border: "1.5px solid " + C.border, background: C.card, fontFamily: F_BODY, fontSize: 14 }}>
              🇮🇳 +91
            </div>
            <input value={phone} onChange={(e) => setPhone(e.target.value.replace(/\D/g, "").slice(0, 10))}
              placeholder="Phone number" inputMode="numeric"
              style={{ flex: 1, padding: "13px 16px", borderRadius: 12, border: "1.5px solid " + C.border, fontFamily: F_BODY, fontSize: 14, outline: "none", background: C.card }} />
          </div>
          <p style={{ fontFamily: F_BODY, fontSize: 10.5, color: C.sub, marginBottom: 12, textAlign: "center" }}>
            🔒 Yeh number sirf login ke liye hai — kisi ko kabhi nahi dikhega
          </p>
          {error && <p style={{ fontFamily: F_BODY, fontSize: 11.5, color: C.pinkDeep, marginBottom: 10 }}>{error}</p>}
          <button onClick={sendOtp} disabled={busy} style={{ width: "100%", padding: "13px 0", background: GRAD, color: "#fff", borderRadius: 999, fontFamily: F_BODY, fontWeight: 700, fontSize: 14, border: "none" }}>
            {busy ? "Bhej rahe hain…" : "OTP Bhejein"}
          </button>
        </div>
      )}

      {step === "otp" && (
        <div style={{ width: "100%" }}>
          <p style={{ fontFamily: F_BODY, fontSize: 12.5, color: C.ink, marginBottom: 12, textAlign: "center" }}>+91 {phone} pe OTP bheja gaya</p>
          <input value={otp} onChange={(e) => setOtp(e.target.value.replace(/\D/g, "").slice(0, 6))}
            placeholder="6-digit OTP" inputMode="numeric"
            style={{ width: "100%", padding: "13px 16px", borderRadius: 12, border: "1.5px solid " + C.border, marginBottom: 10, fontFamily: F_BODY, fontSize: 14, outline: "none", background: C.card, textAlign: "center", letterSpacing: 4 }} />
          {error && <p style={{ fontFamily: F_BODY, fontSize: 11.5, color: C.pinkDeep, marginBottom: 10 }}>{error}</p>}
          <button onClick={verifyOtp} disabled={busy} style={{ width: "100%", padding: "13px 0", background: GRAD, color: "#fff", borderRadius: 999, fontFamily: F_BODY, fontWeight: 700, fontSize: 14, border: "none" }}>
            {busy ? "Verify ho raha hai…" : "Verify Karein"}
          </button>
          <button onClick={() => setStep("phone")} style={{ marginTop: 12, background: "none", border: "none" }}>
            <span style={{ fontFamily: F_BODY, fontSize: 12, color: C.sub }}>Number badlein</span>
          </button>
        </div>
      )}

      {step === "username" && (
        <div style={{ width: "100%" }}>
          <p style={{ fontFamily: F_BODY, fontWeight: 700, fontSize: 15, color: C.ink, marginBottom: 4, textAlign: "center" }}>Apna Username Chunein</p>
          <p style={{ fontFamily: F_BODY, fontSize: 11.5, color: C.sub, marginBottom: 16, textAlign: "center" }}>
            Yeh sabko dikhega — dost isi se aapko dhundenge, phone number kabhi nahi
          </p>
          <div style={{ display: "flex", alignItems: "center", width: "100%", marginBottom: 10, borderRadius: 12, border: "1.5px solid " + C.border, background: C.card, padding: "13px 16px" }}>
            <span style={{ fontFamily: F_BODY, fontSize: 14, color: C.sub, marginRight: 2 }}>@</span>
            <input value={handle} onChange={(e) => setHandle(e.target.value)} placeholder="username"
              style={{ flex: 1, background: "transparent", border: "none", outline: "none", fontFamily: F_BODY, fontSize: 14 }} />
          </div>
          {error && <p style={{ fontFamily: F_BODY, fontSize: 11.5, color: C.pinkDeep, marginBottom: 10 }}>{error}</p>}
          <button onClick={finishSignup} disabled={busy} style={{ width: "100%", padding: "13px 0", background: GRAD, color: "#fff", borderRadius: 999, fontFamily: F_BODY, fontWeight: 700, fontSize: 14, border: "none" }}>
            {busy ? "Ruko…" : "Shuru Karein"}
          </button>
        </div>
      )}
    </div>
  );
}

/* ---------- HOME (placeholder — feed/stories/chat agle steps mein jud'enge) ---------- */
function HomeScreen({ handle, onLogout }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%", alignItems: "center", justifyContent: "center", padding: "0 24px", background: C.bg }}>
      <Logo size={30} />
      <p style={{ fontFamily: F_DISPLAY, fontWeight: 700, fontSize: 18, color: C.ink, marginTop: 20 }}>Welcome, @{handle} 🎉</p>
      <p style={{ fontFamily: F_BODY, fontSize: 12.5, color: C.sub, marginTop: 8, textAlign: "center" }}>
        Login real Firebase se connect ho gaya hai! Agla step: Feed, Stories aur Chat isi account se jodenge.
      </p>
      <button onClick={onLogout} style={{ marginTop: 24, padding: "10px 24px", border: "1px solid " + C.border, borderRadius: 999, background: "none", fontFamily: F_BODY, fontWeight: 600, fontSize: 12.5, color: C.sub }}>
        Logout
      </button>
    </div>
  );
}

function App() {
  const [loading, setLoading] = useState(true);
  const [user, setUser] = useState(null); // { uid, handle }

  useEffect(() => {
    const unsub = auth.onAuthStateChanged(async (fbUser) => {
      if (fbUser) {
        const doc = await db.collection("users").doc(fbUser.uid).get();
        if (doc.exists && doc.data().handle) {
          setUser({ uid: fbUser.uid, handle: doc.data().handle });
        } else {
          setUser(null);
        }
      } else {
        setUser(null);
      }
      setLoading(false);
    });
    return () => unsub();
  }, []);

  const handleLogout = () => { auth.signOut(); setUser(null); };

  return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "#F3F3F3" }}>
      <div style={{ width: 390, height: 844, borderRadius: 44, background: C.ink, padding: 12, boxShadow: "0 30px 60px rgba(0,0,0,0.25)" }}>
        <div style={{ width: "100%", height: "100%", borderRadius: 34, overflow: "hidden", position: "relative" }}>
          {loading ? (
            <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100%", background: C.ink }}>
              <span style={{ fontFamily: F_DISPLAY, fontStyle: "italic", color: "#fff", fontSize: 20 }}>InstaChat</span>
            </div>
          ) : user ? (
            <HomeScreen handle={user.handle} onLogout={handleLogout} />
          ) : (
            <AuthScreen onReady={(uid, handle) => setUser({ uid, handle })} />
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
